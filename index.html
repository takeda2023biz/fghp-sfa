.btn-primary:hover{background:#0C447C}
.btn-sm{padding:4px 10px;font-size:12px}
.error-msg{color:#c0392b;font-size:12px;margin-top:8px;text-align:center}

.topbar-title{font-size:15px;font-weight:600;color:#1a1a1a}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-info{font-size:12px;color:#666}
.user-role{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;margin-left:6px}
.role-maker{background:#FAEEDA;color:#633806}
.role-tokuyakuten{background:#EEEDFE;color:#3C3489}
.role-agency{background:#E6F1FB;color:#0C447C}

.sidebar{width:180px;background:#fff;border-right:1px solid #e8e8e8;padding:12px 0;flex-shrink:0;min-height:calc(100vh - 50px)}

.stat-sub{font-size:11px;color:#aaa;margin-top:2px}

.dash-card-title{font-size:13px;font-weight:600;margin-bottom:14px;color:#333}

.bar-label{font-size:12px;color:#666;min-width:80px}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;background:#185FA5;border-radius:4px;transition:width 0.4s}

};

const PREFS = Object.keys(PREF_TO_AREA);

// 住所文字列から都道府県を抽出
function extractPrefecture(address) {
  if (!address) return '';
  for (const pref of PREFS) {
    if (address.includes(pref)) return pref;
  }
  // 「鹿児島」など「県」なしでも検出
  const shorts = ['北海道','東京都','大阪府','京都府'];
  for (const s of shorts) {
    if (address.includes(s)) return s;
  }
  // 短縮形（例：「鹿児島市」→「鹿児島県」）
  const prefMap = {
    '鹿児島':'鹿児島県','福岡':'福岡県','熊本':'熊本県','宮崎':'宮崎県','大分':'大分県',
    '佐賀':'佐賀県','長崎':'長崎県','沖縄':'沖縄県','鹿屋':'鹿児島県','薩摩':'鹿児島県',
    '奄美':'鹿児島県','霧島':'鹿児島県','姶良':'鹿児島県','出水':'鹿児島県',
    '志布志':'鹿児島県','伊佐':'鹿児島県','日置':'鹿児島県','阿久根':'鹿児島県'
  };
  for (const [key, val] of Object.entries(prefMap)) {
    if (address.includes(key)) return val;
  }
  return '';
}

// 住所入力時に都道府県・エリアを自動セット
function onAddressInput(val) {
  const pref = extractPrefecture(val);
  const area = pref ? (PREF_TO_AREA[pref] || '') : '';
  const prefEl = document.getElementById('f_prefecture');
  const areaEl = document.getElementById('f_area');
  if (prefEl && pref && !prefEl.value) prefEl.value = pref;
  if (areaEl && area && !areaEl.value) areaEl.value = area;
}

// 都道府県変更時にエリアを自動セット
function onPrefChange(val) {
  const areaEl = document.getElementById('f_area');
  if (areaEl) areaEl.value = PREF_TO_AREA[val] || '';
}

// ── localStorage でターゲット住所情報を永続化 ──────────────────
const LS_KEY = 'fghp_target_locations';

function loadTargetLocations() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (!saved) return {};
    return JSON.parse(saved);
  } catch(e) { return {}; }
}

function saveTargetLocations(locs) {
  localStorage.setItem(LS_KEY, JSON.stringify(locs));
}

// TARGETS_DEFAULT に localStorage の情報をマージして返す
function getTargets() {
  const locs = loadTargetLocations();
  return TARGETS_DEFAULT.map(t => {
    const saved = locs[t.name];
    if (saved) return {...t, ...saved};
    return t;
  });
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value;
  const pass=document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('loginError').textContent='ログインに失敗しました: '+error.message;return;}
  await loadProfile(data.user);
}
 
async function loadProfile(user){
  currentUser=user;
  const {data}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=data;
  await loadDeals();
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='flex';
  const roleClass={'maker':'role-maker','tokuyakuten':'role-tokuyakuten','agency':'role-agency'}[data.role]||'role-agency';
  const roleLabel={'maker':'メーカー','tokuyakuten':'特約店','agency':'代理店'}[data.role]||'代理店';
  document.getElementById('userInfoLabel').innerHTML=`${data.name}<span class="user-role ${roleClass}">${roleLabel}</span>`;
  currentView='list';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  var navEl=document.getElementById('nav-list');
  if(navEl) navEl.classList.add('active');
  renderView();
}
 
async function loadDeals(){
  const {data}=await sb.from('deals').select('*');
  deals=data||[];
}
 
async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;currentProfile=null;deals=[];
  document.getElementById('loginView').style.display='flex';
  document.getElementById('appView').style.display='none';
}
 
sb.auth.onAuthStateChange(async(event,session)=>{
  if(session&&!currentUser) await loadProfile(session.user);
});
 
function canSee(deal){
  if(!currentProfile) return false;
  if(currentProfile.role==='maker'||currentProfile.role==='tokuyakuten') return true;
  return deal.agency_name===currentProfile.agency_name;
}
function canEdit(deal){
  if(!currentProfile) return false;
  if(currentProfile.role!=='agency') return false;
  return deal.agency_name===currentProfile.agency_name;
}
function canCreate(){
  return currentProfile&&currentProfile.role==='agency';
}
function canEditTarget(){
  // 全ロールでターゲット基本情報の住所等は編集可能
  return !!currentProfile;
}
 
function getDeal(targetName){
  return deals.find(d=>d.agency_name===(currentProfile&&currentProfile.agency_name) ? d.target_name===targetName : false) || deals.find(d=>d.target_name===targetName);
}
 
function showView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  var navEl=document.getElementById('nav-'+v);
  if(navEl) navEl.classList.add('active');
  page=0; targetPage=0;
  renderView();
}
 
function renderView(){
  const c=document.getElementById('mainContent');
  if(currentView==='list') renderList(c);
  else if(currentView==='kanban') renderKanban(c);
  else if(currentView==='dashboard') renderDashboard(c);
  else if(currentView==='targets') renderTargets(c);
}
 
function getFiltered(){
  return TARGETS.filter(t=>{
    if(searchQ&&!t.name.includes(searchQ)&&!t.industry.includes(searchQ)) return false;
    if(filtCat&&t.category!==filtCat) return false;
    if(filtPriority&&t.priority!==filtPriority) return false;
    if(filtStatus){
      const d=deals.find(x=>x.target_name===t.name);
      const st=d?d.status:'未着手';
      if(st!==filtStatus) return false;
    }
    return true;
  });
}

function checkDuplicate(name){
  const msg=document.getElementById('duplicate-msg');
  if(!name){msg.innerHTML='';return;}
  const ownDeal=deals.find(d=>d.target_name===name&&d.agency_name===currentProfile.agency_name);
  const otherDeal=deals.find(d=>d.target_name===name&&d.agency_name!==currentProfile.agency_name);
  if(ownDeal){
    msg.innerHTML=`<div style="background:#F8D7DA;border:1px solid #f5c6cb;border-radius:8px;padding:8px 12px;font-size:12px;color:#721C24">⛔ 自社ですでに登録済みの企業です。重複登録はできません。</div>`;
    document.getElementById('btn-save-new').disabled=true;
    document.getElementById('btn-save-new').style.opacity='0.5';
  } else if(otherDeal){
    msg.innerHTML=`<div style="background:#FFF3CD;border:1px solid #FFECB5;border-radius:8px;padding:8px 12px;font-size:12px;color:#856404">⚠️ 他の代理店がすでに案件登録しています。このまま登録しますか？</div>`;
    document.getElementById('btn-save-new').disabled=false;
    document.getElementById('btn-save-new').style.opacity='1';
  } else {
    msg.innerHTML=`<div style="background:#D4EDDA;border:1px solid #c3e6cb;border-radius:8px;padding:8px 12px;font-size:12px;color:#155724">✅ 登録可能です。</div>`;
    document.getElementById('btn-save-new').disabled=false;
    document.getElementById('btn-save-new').style.opacity='1';
  }
}
 
async function saveDeal(targetName){
  const d=deals.find(x=>x.target_name===targetName);
  const payload={
    target_name:targetName,
    agency_name:currentProfile.agency_name,
    status:document.getElementById('f_status').value,
    person:document.getElementById('f_person').value,
    amount:parseInt(document.getElementById('f_amount').value)||0,
    first_contact:document.getElementById('f_firstContact').value||null,
    next_action:document.getElementById('f_nextAction').value,
    memo:document.getElementById('f_memo').value,
    updated_at:new Date().toISOString(),
  };
  if(d){
    await sb.from('deals').update(payload).eq('id',d.id);
  } else {
    payload.created_at=new Date().toISOString();
    await sb.from('deals').insert(payload);
  }
  await loadDeals();
  closeModal();
  renderView();
}

  const freeEl=document.getElementById('f_target_free');
  const isListMode=document.getElementById('input-list').style.display!=='none';
  const targetName=isListMode?(listEl?listEl.value:''):(freeEl?freeEl.value.trim():'');
 
  if(!targetName){
    alert('企業名を入力または選択してください。');
    return;
  }
  const ownDeal=deals.find(d=>d.target_name===targetName&&d.agency_name===currentProfile.agency_name);
  if(ownDeal){
    alert('自社ですでに登録済みの企業です。');
    return;
  }
  const payload={
    target_name:targetName,
    agency_name:currentProfile.agency_name,
    status:document.getElementById('f_status').value,
    person:document.getElementById('f_person').value,
    amount:parseInt(document.getElementById('f_amount').value)||0,
    first_contact:document.getElementById('f_firstContact').value||null,
    next_action:document.getElementById('f_nextAction').value,
    memo:document.getElementById('f_memo').value,
    created_at:new Date().toISOString(),
    updated_at:new Date().toISOString(),
  };
  await sb.from('deals').insert(payload);
  await loadDeals();
  closeModal();
  renderView();
}
 
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
</body>
</html>
