.app{display:flex;flex-direction:column;min-height:100vh}

.btn{padding:9px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#333;font-size:13px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;width:100%;padding:11px}
.btn-primary:hover{background:#0C447C}
.btn-sm{padding:4px 10px;font-size:12px}
.error-msg{color:#c0392b;font-size:12px;margin-top:8px;text-align:center}
/* トップバー */
.topbar{background:#fff;border-bottom:1px solid #e8e8e8;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600;color:#1a1a1a}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-info{font-size:12px;color:#666}
.user-role{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;margin-left:6px}
.role-maker{background:#FAEEDA;color:#633806}
.role-tokuyakuten{background:#EEEDFE;color:#3C3489}
.role-agency{background:#E6F1FB;color:#0C447C}

.main{display:flex;flex:1}
.sidebar{width:180px;background:#fff;border-right:1px solid #e8e8e8;padding:12px 0;flex-shrink:0;min-height:calc(100vh - 50px)}
.nav-item{padding:9px 18px;font-size:13px;color:#666;cursor:pointer;border-left:3px solid transparent}
.nav-item:hover{background:#f5f5f5;color:#333}
.nav-item.active{background:#EBF3FB;color:#185FA5;border-left:3px solid #185FA5;font-weight:500}
.nav-section{padding:6px 14px;font-size:10px;color:#aaa;font-weight:600;margin-top:10px;letter-spacing:0.5px;text-transform:uppercase}
.content{flex:1;padding:20px;overflow-y:auto}

.stat-card{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:14px 16px}
.stat-label{font-size:11px;color:#888;margin-bottom:5px}
.stat-value{font-size:24px;font-weight:600;color:#1a1a1a}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
input.search{flex:1;min-width:160px;padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#333;background:#fff}
select.filt{padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#333;background:#fff}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:600;color:#1a1a1a}
.card-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e8e8e8}

};

const PREFS = Object.keys(PREF_TO_AREA);

// 住所文字列から都道府県を抽出
function extractPrefecture(address) {
  if (!address) return '';
  for (const pref of PREFS) {
    if (address.includes(pref)) return pref;
  }
  // 「鹿児島」など「県」なしでも検出
  const shorts = ['北海道','東京都','大阪府','京都府'];
  for (const s of shorts) {
    if (address.includes(s)) return s;
  }
  // 短縮形（例：「鹿児島市」→「鹿児島県」）
  const prefMap = {
    '鹿児島':'鹿児島県','福岡':'福岡県','熊本':'熊本県','宮崎':'宮崎県','大分':'大分県',
    '佐賀':'佐賀県','長崎':'長崎県','沖縄':'沖縄県','鹿屋':'鹿児島県','薩摩':'鹿児島県',
    '奄美':'鹿児島県','霧島':'鹿児島県','姶良':'鹿児島県','出水':'鹿児島県',
    '志布志':'鹿児島県','伊佐':'鹿児島県','日置':'鹿児島県','阿久根':'鹿児島県'
  };
  for (const [key, val] of Object.entries(prefMap)) {
    if (address.includes(key)) return val;
  }
  return '';
}

// 住所入力時に都道府県・エリアを自動セット
function onAddressInput(val) {
  const pref = extractPrefecture(val);
  const area = pref ? (PREF_TO_AREA[pref] || '') : '';
  const prefEl = document.getElementById('f_prefecture');
  const areaEl = document.getElementById('f_area');
  if (prefEl && pref && !prefEl.value) prefEl.value = pref;
  if (areaEl && area && !areaEl.value) areaEl.value = area;
}

// 都道府県変更時にエリアを自動セット
function onPrefChange(val) {
  const areaEl = document.getElementById('f_area');
  if (areaEl) areaEl.value = PREF_TO_AREA[val] || '';
}

const CAT_LABELS={'自治体_体育館_公園_港湾':'自治体・体育館','船舶関連':'船舶関連','駐車場_屋外施設':'駐車場・屋外','ゴルフ場':'ゴルフ場','工場_物流_プラント':'工場・物流'};
const STATUSES=['未着手','アプローチ済','提案中','交渉中','受注','失注'];

// ── localStorage でターゲット住所情報を永続化 ──────────────────
const LS_KEY = 'fghp_target_locations';

function loadTargetLocations() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (!saved) return {};
    return JSON.parse(saved);
  } catch(e) { return {}; }
}

function saveTargetLocations(locs) {
  localStorage.setItem(LS_KEY, JSON.stringify(locs));
}

// TARGETS_DEFAULT に localStorage の情報をマージして返す
function getTargets() {
  const locs = loadTargetLocations();
  return TARGETS_DEFAULT.map(t => {
    const saved = locs[t.name];
    if (saved) return {...t, ...saved};
    return t;
  });
}

let TARGETS = getTargets();

let currentUser=null, currentProfile=null, currentView='list';
let deals=[], searchQ='', filtCat='', filtPriority='', filtStatus='', page=0;
let targetPage=0;
const PAGE_SIZE=20;
const TARGET_PAGE_SIZE=50;
 
let _loginBusy = false;
async function doLogin(){
  if(_loginBusy) return;
  _loginBusy = true;
  const btn = document.querySelector('#loginView .btn-primary');
  if(btn){ btn.textContent='ログイン中...'; btn.disabled=true; }
  document.getElementById('loginError').textContent='';
  try {
    const email=document.getElementById('loginEmail').value.trim();
    const pass=document.getElementById('loginPassword').value;
    if(!email||!pass){
      document.getElementById('loginError').textContent='メールアドレスとパスワードを入力してください。';
      return;
    }
    // localStorageの古いSupabaseセッションを直接クリア
    Object.keys(localStorage).forEach(k=>{ if(k.startsWith('sb-')) localStorage.removeItem(k); });
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      document.getElementById('loginError').textContent='ログインに失敗しました: '+error.message;
      return;
    }
    await loadProfile(data.user);
  } catch(e) {
    document.getElementById('loginError').textContent='エラーが発生しました。再度お試しください。';
  } finally {
    _loginBusy = false;
    if(btn){ btn.textContent='ログイン'; btn.disabled=false; }
  }
}
 
async function loadProfile(user){
  currentUser=user;
  const {data}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=data;
  await loadDeals();
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='flex';
  const roleClass={'maker':'role-maker','tokuyakuten':'role-tokuyakuten','agency':'role-agency'}[data.role]||'role-agency';
  const roleLabel={'maker':'メーカー','tokuyakuten':'特約店','agency':'代理店'}[data.role]||'代理店';
  document.getElementById('userInfoLabel').innerHTML=`${data.name}<span class="user-role ${roleClass}">${roleLabel}</span>`;
  currentView='list';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  var navEl=document.getElementById('nav-list');
  if(navEl) navEl.classList.add('active');
  renderView();
}
 
async function loadDeals(){
  const {data}=await sb.from('deals').select('*');
  deals=data||[];
}
 
async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;currentProfile=null;deals=[];
  document.getElementById('loginView').style.display='flex';
  document.getElementById('appView').style.display='none';
}
 
sb.auth.onAuthStateChange(async(event,session)=>{
  // SIGNED_IN イベントのみ対応（古いキャッシュセッションを自動ログインしない）
  if(event==='SIGNED_IN' && session && !currentUser){
    await loadProfile(session.user);
  }
  // SIGNED_OUT時は確実にログイン画面へ
  if(event==='SIGNED_OUT'){
    currentUser=null; currentProfile=null; deals=[];
    document.getElementById('loginView').style.display='flex';
    document.getElementById('appView').style.display='none';
  }
});
 
function canSee(deal){
  if(!currentProfile) return false;
  if(currentProfile.role==='maker'||currentProfile.role==='tokuyakuten') return true;
  return deal.agency_name===currentProfile.agency_name;
}
function canEdit(deal){
  if(!currentProfile) return false;
  if(currentProfile.role!=='agency') return false;
  return deal.agency_name===currentProfile.agency_name;
}
function canCreate(){
  return currentProfile&&currentProfile.role==='agency';
}
function canEditTarget(){
  // 全ロールでターゲット基本情報の住所等は編集可能
  return !!currentProfile;
}
 
function getDeal(targetName){
  return deals.find(d=>d.agency_name===(currentProfile&&currentProfile.agency_name) ? d.target_name===targetName : false) || deals.find(d=>d.target_name===targetName);
}
 
function showView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  var navEl=document.getElementById('nav-'+v);
  if(navEl) navEl.classList.add('active');
  page=0; targetPage=0;
  renderView();
}
 
function renderView(){
  const c=document.getElementById('mainContent');
  if(currentView==='list') renderList(c);
  else if(currentView==='kanban') renderKanban(c);
  else if(currentView==='dashboard') renderDashboard(c);
  else if(currentView==='targets') renderTargets(c);
}
 
function getFiltered(){
  return TARGETS.filter(t=>{
    if(searchQ&&!t.name.includes(searchQ)&&!t.industry.includes(searchQ)) return false;
    if(filtCat&&t.category!==filtCat) return false;
    if(filtPriority&&t.priority!==filtPriority) return false;
    if(filtStatus){
      const d=deals.find(x=>x.target_name===t.name);
      const st=d?d.status:'未着手';
      if(st!==filtStatus) return false;
    }
    return true;
  });
}
 
function renderList(c){
  const extraDeals=deals.filter(d=>!TARGETS.find(t=>t.name===d.target_name));
  const extraTargets=extraDeals.map(d=>({name:d.target_name,url:'',industry:'（自由登録）',category:'',priority:'-',rank:9999,address:'',prefecture:'',area:''}));
  const allTargets=[...TARGETS,...extraTargets.filter((t,i,a)=>a.findIndex(x=>x.name===t.name)===i)];
 
  const filtered=allTargets.filter(t=>{
    if(searchQ&&!t.name.includes(searchQ)&&!t.industry.includes(searchQ)) return false;
    if(filtCat&&t.category!==filtCat) return false;
    if(filtPriority&&t.priority!==filtPriority) return false;
    if(filtStatus){
      const d=deals.find(x=>x.target_name===t.name);
      const st=d?d.status:'未着手';
      if(st!==filtStatus) return false;
    }
    return true;
  });
 
  const pageData=filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const myDeals=deals.filter(d=>d.agency_name===currentProfile.agency_name);
  const wonAmt=myDeals.filter(d=>d.status==='受注').reduce((s,d)=>s+(d.amount||0),0);
 
  let roleMsg='';
  if(currentProfile.role==='agency') roleMsg=`<div class="info-banner">自社（${currentProfile.agency_name}）の商談情報のみ編集できます。他社の商談情報は閲覧できません。</div>`;
  else if(currentProfile.role==='tokuyakuten') roleMsg=`<div class="info-banner">特約店として配下の全代理店の商談情報を閲覧できます。</div>`;
  else roleMsg=`<div class="info-banner">メーカーとして全代理店の商談情報を閲覧できます。</div>`;
 
  let html=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">総ターゲット</div><div class="stat-value">346</div><div class="stat-sub">社・施設</div></div>
    <div class="stat-card"><div class="stat-label">表示件数</div><div class="stat-value">${filtered.length}</div></div>
    <div class="stat-card"><div class="stat-label">自社案件数</div><div class="stat-value">${myDeals.length}</div></div>
    <div class="stat-card"><div class="stat-label">自社受注額</div><div class="stat-value">${Math.round(wonAmt/10000)}万</div><div class="stat-sub">円</div></div>
  </div>${roleMsg}
  <div class="section-head"><span class="section-title">案件一覧</span>${canCreate()?`<button class="btn btn-primary btn-sm" onclick="openNewDeal()">＋ 案件登録</button>`:''}</div>
  <div class="toolbar">
    <input class="search" placeholder="企業名・業種で検索..." value="${searchQ}" oninput="searchQ=this.value;page=0;renderView()">
    <select class="filt" onchange="filtCat=this.value;page=0;renderView()">
      <option value="">全カテゴリ</option>
      ${Object.entries(CAT_LABELS).map(([k,v])=>`<option value="${k}"${filtCat===k?' selected':''}>${v}</option>`).join('')}
    </select>
    <select class="filt" onchange="filtPriority=this.value;page=0;renderView()">
      <option value="">全優先度</option>
      <option value="S"${filtPriority==='S'?' selected':''}>S</option>
      <option value="A"${filtPriority==='A'?' selected':''}>A</option>
      <option value="B"${filtPriority==='B'?' selected':''}>B</option>
    </select>
    <select class="filt" onchange="filtStatus=this.value;page=0;renderView()">
      <option value="">全ステータス</option>
      ${STATUSES.map(s=>`<option value="${s}"${filtStatus===s?' selected':''}>${s}</option>`).join('')}
    </select>
  </div>
  <table class="card-table"><thead><tr>
    <th>優先</th><th>企業名</th><th>業種</th><th>カテゴリ</th><th>担当代理店</th><th>ステータス</th><th>提案金額</th><th>初回接触</th><th>次アクション</th><th></th>
  </tr></thead><tbody>`;
 
  pageData.forEach(t=>{
    const d=deals.find(x=>x.target_name===t.name);
    const status=d?d.status:'未着手';
    const isOwn=d&&d.agency_name===currentProfile.agency_name;
    const see=d?canSee(d):false;
    const edit=d?canEdit(d):false;
 
    html+=`<tr>
      <td><span class="badge badge-${t.priority}">${t.priority}</span></td>
      <td><b>${t.name}</b>${isOwn?`<span class="own-tag">自社</span>`:''}<br><span style="font-size:10px;color:#aaa">${t.url?`<a href="${t.url}" target="_blank" style="color:#185FA5">${t.url.replace('https://','').substring(0,28)}</a>`:''}</span></td>
      <td>${t.industry}</td>
      <td style="font-size:11px">${CAT_LABELS[t.category]||t.category}</td>
      <td>${see&&d?`<span class="badge badge-agency">${d.agency_name}</span>`:(d&&!see?`<span class="locked">非公開</span>`:'-')}</td>
      <td><span class="badge badge-${status}">${status}</span></td>
      <td>${see&&d&&d.amount?Math.round(d.amount/10000)+'万円':(d&&!see?`<span class="locked">-</span>`:'-')}</td>
      <td style="font-size:11px">${d?d.first_contact||'-':'-'}</td>
      <td style="font-size:11px">${see&&d?d.next_action||'-':(d&&!see?`<span class="locked">-</span>`:'-')}</td>

  html+=`</tbody></table>

    <span>${page+1} / ${totalPages||1}</span>
    <button ${page>=totalPages-1?'disabled':''} onclick="page++;renderView()">次へ ▶</button>
  </div>`;
  c.innerHTML=html;
}
 
function renderKanban(c){
  let html=`<div class="section-head"><span class="section-title">商談ボード</span></div><div class="kanban-wrap">`;
  STATUSES.forEach(st=>{
    const items=deals.filter(d=>d.status===st&&(currentProfile.role!=='agency'||d.agency_name===currentProfile.agency_name));
    html+=`<div class="kanban-col"><div class="kanban-col-title"><span class="badge badge-${st}">${st}</span><span style="color:#aaa;font-size:11px">${items.length}</span></div>`;
    items.forEach(d=>{
      html+=`<div class="kanban-card" onclick="openDeal('${d.target_name.replace(/'/g,"\\'")}',true)">
        <div class="kanban-card-name">${d.target_name}</div>
        <div class="kanban-card-cat"><span class="badge badge-agency">${d.agency_name}</span></div>
        ${d.amount?`<div class="kanban-card-amt">${Math.round(d.amount/10000)}万円</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  c.innerHTML=html;
}
 
function renderDashboard(c){
  const myDeals=deals.filter(d=>currentProfile.role!=='agency'||d.agency_name===currentProfile.agency_name);
  const byStatus={};STATUSES.forEach(s=>byStatus[s]=0);
  myDeals.forEach(d=>byStatus[d.status]=(byStatus[d.status]||0)+1);
  const wonAmt=myDeals.filter(d=>d.status==='受注').reduce((s,d)=>s+(d.amount||0),0);
  const pipeAmt=myDeals.filter(d=>['提案中','交渉中'].includes(d.status)).reduce((s,d)=>s+(d.amount||0),0);
 
  let html=`<div class="section-head"><span class="section-title">ダッシュボード</span></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">総案件数</div><div class="stat-value">${myDeals.length}</div></div>
    <div class="stat-card"><div class="stat-label">受注済</div><div class="stat-value">${byStatus['受注']||0}</div></div>
    <div class="stat-card"><div class="stat-label">受注額</div><div class="stat-value">${Math.round(wonAmt/10000)}万</div><div class="stat-sub">円</div></div>
    <div class="stat-card"><div class="stat-label">パイプライン</div><div class="stat-value">${Math.round(pipeAmt/10000)}万</div><div class="stat-sub">円</div></div>
  </div>
  <div class="dash-grid">
    <div class="dash-card"><div class="dash-card-title">ステータス別件数</div>
      ${STATUSES.map(s=>`<div class="bar-row"><span class="bar-label"><span class="badge badge-${s}">${s}</span></span><div class="bar-track"><div class="bar-fill" style="width:${myDeals.length?Math.round((byStatus[s]||0)/myDeals.length*100):0}%"></div></div><span class="bar-count">${byStatus[s]||0}</span></div>`).join('')}
    </div>
    <div class="dash-card"><div class="dash-card-title">代理店別案件数</div>
      ${Object.entries(deals.reduce((acc,d)=>{acc[d.agency_name]=(acc[d.agency_name]||0)+1;return acc},{})).map(([k,v])=>`<div class="bar-row"><span class="bar-label" style="font-size:11px">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${deals.length?Math.round(v/deals.length*100):0}%;background:#1D9E75"></div></div><span class="bar-count">${v}</span></div>`).join('')||'<div style="color:#aaa;font-size:12px">データなし</div>'}
    </div>
  </div>`;
  c.innerHTML=html;
}

// ── ターゲット管理（住所・都道府県・エリア付き） ─────────────────
function renderTargets(c){
  const tFiltered = TARGETS;
  const tTotalPages = Math.ceil(tFiltered.length / TARGET_PAGE_SIZE);
  const tPage = tFiltered.slice(targetPage * TARGET_PAGE_SIZE, (targetPage+1) * TARGET_PAGE_SIZE);

  let html=`<div class="section-head"><span class="section-title">ターゲット管理（基本情報）</span></div>
  <div class="info-banner">基本情報は全ユーザーが閲覧できます。「編集」ボタンをクリックして住所・都道府県・エリアを登録できます。</div>
  <table class="card-table"><thead><tr>
    <th>優先</th><th>企業名</th><th>業種</th><th>カテゴリ</th>
    <th>住所</th><th>都道府県</th><th>エリア</th><th>URL</th><th></th>
  </tr></thead><tbody>`;

  tPage.forEach(t=>{
    const hasAddr = t.address || t.prefecture || t.area;
    html+=`<tr>
      <td><span class="badge badge-${t.priority}">${t.priority}</span></td>
      <td><b>${t.name}</b></td>
      <td style="font-size:11px">${t.industry}</td>
      <td style="font-size:11px">${CAT_LABELS[t.category]||t.category}</td>
      <td style="font-size:11px;color:${t.address?'#333':'#bbb'}">${t.address||'未登録'}</td>
      <td style="font-size:11px">${t.prefecture?`<span style="background:#f0f4ff;color:#2b4acb;padding:1px 6px;border-radius:4px;font-size:11px">${t.prefecture}</span>`:'<span style="color:#bbb">-</span>'}</td>
      <td style="font-size:11px">${t.area?`<span style="background:#f0faf4;color:#1a7a4a;padding:1px 6px;border-radius:4px;font-size:11px">${t.area}</span>`:'<span style="color:#bbb">-</span>'}</td>
      <td style="font-size:11px">${t.url?`<a href="${t.url}" target="_blank" style="color:#185FA5">サイトへ</a>`:''}</td>
      <td><button class="btn btn-sm" onclick="openTargetEdit('${t.name.replace(/'/g,"\\'")}')">編集</button></td>
    </tr>`;
  });

  html+=`</tbody></table>
  <div class="pager">
    <span>${tFiltered.length}件中 ${targetPage*TARGET_PAGE_SIZE+1}〜${Math.min((targetPage+1)*TARGET_PAGE_SIZE,tFiltered.length)}件</span>
    <button ${targetPage===0?'disabled':''} onclick="targetPage--;renderView()">◀ 前へ</button>
    <span>${targetPage+1} / ${tTotalPages||1}</span>
    <button ${targetPage>=tTotalPages-1?'disabled':''} onclick="targetPage++;renderView()">次へ ▶</button>
  </div>`;
  c.innerHTML=html;
}

// ── ターゲット住所編集モーダル ──────────────────────────────────
function openTargetEdit(targetName) {
  const t = TARGETS.find(x => x.name === targetName);
  if (!t) return;

  const prefOptions = PREFS.map(p =>
    `<option value="${p}"${t.prefecture===p?' selected':''}>${p}</option>`
  ).join('');

  const areaOptions = [...new Set(Object.values(PREF_TO_AREA))].map(a =>
    `<option value="${a}"${t.area===a?' selected':''}>${a}</option>`
  ).join('');

  let html = `<div class="modal-title">${t.name} <span style="font-size:12px;color:#888">— 基本情報編集</span></div>
  <div style="background:#f8f8f8;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#666">
    業種：${t.industry}　カテゴリ：${CAT_LABELS[t.category]||t.category}
  </div>
  <div class="form-section">住所・エリア情報</div>
  <div class="form-row">
    <label class="form-label">住所 <span class="auto-badge">入力で都道府県・エリアを自動判定</span></label>
    <input class="form-input" id="f_address" value="${t.address||''}" placeholder="例：鹿児島県鹿児島市山下町11-1"
      oninput="onAddressInput(this.value)">
  </div>
  <div class="form-row">
    <label class="form-label">都道府県 <span class="auto-badge">自動入力</span></label>
    <select class="form-input" id="f_prefecture" onchange="onPrefChange(this.value)">
      <option value="">-- 選択 --</option>
      ${prefOptions}
    </select>
  </div>
  <div class="form-row">
    <label class="form-label">エリア <span class="auto-badge">自動入力</span></label>
    <select class="form-input" id="f_area">
      <option value="">-- 選択 --</option>
      ${areaOptions}
    </select>
  </div>
  <div class="modal-actions">
    <button class="btn" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveTargetLocation('${targetName.replace(/'/g,"\\'")}')">保存</button>
  </div>`;

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function saveTargetLocation(targetName) {
  const address = document.getElementById('f_address').value.trim();
  const prefecture = document.getElementById('f_prefecture').value;
  const area = document.getElementById('f_area').value;

  // localStorageに保存
  const locs = loadTargetLocations();
  locs[targetName] = {address, prefecture, area};
  saveTargetLocations(locs);

  // メモリ上のTARGETSも更新
  TARGETS = getTargets();

  closeModal();
  renderView();
}

function openDeal(targetName, isOwn){
  // TARGETSリストにない自由登録企業にも対応
  const t=TARGETS.find(x=>x.name===targetName) || {name:targetName,url:'',industry:'（自由登録）',category:'',priority:'-',address:'',prefecture:'',area:''};
  const d=deals.find(x=>x.target_name===targetName);
  const see=d?canSee(d):canCreate();
  const edit=d?canEdit(d):canCreate();
 
  let html=`<div class="modal-title">${t.name} <span style="font-size:13px;color:#888">— ${CAT_LABELS[t.category]||'自由登録'}</span></div>
  <div style="background:#f8f8f8;border-radius:8px;padding:12px;margin-bottom:16px">
    <div style="font-size:11px;color:#888;margin-bottom:6px;font-weight:600">基本情報（全員閲覧可）</div>
    <div style="font-size:12px;display:grid;grid-template-columns:80px 1fr;gap:4px 8px">
      <span style="color:#888">業種</span><span>${t.industry}</span>
      ${t.priority&&t.priority!=='-'?`<span style="color:#888">優先度</span><span><span class="badge badge-${t.priority}">${t.priority}</span></span>`:''}
      ${t.address?`<span style="color:#888">住所</span><span>${t.address}</span>`:''}
      ${t.prefecture?`<span style="color:#888">都道府県</span><span>${t.prefecture}</span>`:''}
      ${t.area?`<span style="color:#888">エリア</span><span>${t.area}</span>`:''}
      ${t.url?`<span style="color:#888">URL</span><span><a href="${t.url}" target="_blank" style="color:#185FA5;font-size:11px">${t.url}</a></span>`:''}
    </div>
  </div>`;
 
  if(d&&!see){
    html+=`<div class="warn-banner">他社の商談情報は閲覧できません。</div>`;
  } else if(edit){
    html+=`<div class="form-section">商談情報</div>
    <div class="form-row"><label class="form-label">ステータス</label>
      <select class="form-input" id="f_status">${STATUSES.map(s=>`<option${(d&&d.status===s)||(!d&&s==='未着手')?' selected':''}>${s}</option>`).join('')}</select>
    </div>
    <div class="form-row"><label class="form-label">先方担当者名</label><input class="form-input" id="f_person" value="${d?d.person||'':''}" placeholder="例：田中課長"></div>
    <div class="form-row"><label class="form-label">提案金額（円）</label><input class="form-input" id="f_amount" type="number" value="${d?d.amount||0:0}"></div>
    <div class="form-row"><label class="form-label">初回接触日</label><input class="form-input" id="f_firstContact" type="date" value="${d?d.first_contact||'':''}"></div>
    <div class="form-row"><label class="form-label">次のアクション</label><input class="form-input" id="f_nextAction" value="${d?d.next_action||'':''}" placeholder="例：見積提出、再訪問"></div>
    <div class="form-row"><label class="form-label">メモ</label><textarea class="form-input" id="f_memo" rows="3">${d?d.memo||'':''}</textarea></div>`;
  } else if(d){
    html+=`<div class="form-section">商談情報（閲覧のみ）</div>
    <div style="font-size:12px;display:grid;grid-template-columns:100px 1fr;gap:6px 8px">
      <span style="color:#888">担当代理店</span><span><span class="badge badge-agency">${d.agency_name}</span></span>
      <span style="color:#888">ステータス</span><span><span class="badge badge-${d.status}">${d.status}</span></span>
      <span style="color:#888">担当者</span><span>${d.person||'-'}</span>
      <span style="color:#888">提案金額</span><span>${d.amount?Math.round(d.amount/10000)+'万円':'-'}</span>
      <span style="color:#888">初回接触</span><span>${d.first_contact||'-'}</span>
      <span style="color:#888">次アクション</span><span>${d.next_action||'-'}</span>
      <span style="color:#888">メモ</span><span>${d.memo||'-'}</span>
    </div>`;
  }
 
  html+=`<div class="modal-actions">
    <button class="btn" onclick="closeModal()">閉じる</button>
    ${edit?`<button class="btn btn-primary" onclick="saveDeal('${targetName.replace(/'/g,"\\'")}')">保存</button>`:''}
  </div>`;
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
 
function openNewDeal(){
  let html=`<div class="modal-title">新規案件登録</div>
  <div class="form-row">
    <label class="form-label">企業名の入力方法</label>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn" id="btn-list" onclick="switchInputMode('list')" style="flex:1;background:#185FA5;color:#fff;border-color:#185FA5">リストから選ぶ</button>
      <button class="btn" id="btn-free" onclick="switchInputMode('free')" style="flex:1">自由入力</button>
    </div>
    <div id="input-list">
      <select class="form-input" id="f_target_list" onchange="checkDuplicate(this.value)">
        <option value="">-- 企業を選択 --</option>
        ${TARGETS.map(t=>`<option value="${t.name}">${t.name}（${CAT_LABELS[t.category]}）</option>`).join('')}
      </select>
    </div>
    <div id="input-free" style="display:none">
      <input class="form-input" id="f_target_free" placeholder="企業名を入力" oninput="checkDuplicate(this.value)">
    </div>
    <div id="duplicate-msg" style="margin-top:6px"></div>
  </div>
  <div class="form-row"><label class="form-label">ステータス</label>
    <select class="form-input" id="f_status">${STATUSES.map(s=>`<option>${s}</option>`).join('')}</select>
  </div>
  <div class="form-row"><label class="form-label">先方担当者名</label><input class="form-input" id="f_person" placeholder="例：田中課長"></div>
  <div class="form-row"><label class="form-label">提案金額（円）</label><input class="form-input" id="f_amount" type="number" value="0"></div>
  <div class="form-row"><label class="form-label">初回接触日</label><input class="form-input" id="f_firstContact" type="date"></div>
  <div class="form-row"><label class="form-label">次のアクション</label><input class="form-input" id="f_nextAction" placeholder="例：訪問アポ取得"></div>
  <div class="form-row"><label class="form-label">メモ</label><textarea class="form-input" id="f_memo" rows="3"></textarea></div>
  <div class="modal-actions">
    <button class="btn" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-primary" id="btn-save-new" onclick="saveNewDeal()">登録</button>
  </div>`;
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
 
function switchInputMode(mode){
  if(mode==='list'){
    document.getElementById('input-list').style.display='block';
    document.getElementById('input-free').style.display='none';
    document.getElementById('btn-list').style.background='#185FA5';
    document.getElementById('btn-list').style.color='#fff';
    document.getElementById('btn-list').style.borderColor='#185FA5';
    document.getElementById('btn-free').style.background='#fff';
    document.getElementById('btn-free').style.color='#333';
    document.getElementById('btn-free').style.borderColor='#ddd';
    document.getElementById('duplicate-msg').innerHTML='';
  } else {
    document.getElementById('input-list').style.display='none';
    document.getElementById('input-free').style.display='block';
    document.getElementById('btn-free').style.background='#185FA5';
    document.getElementById('btn-free').style.color='#fff';
    document.getElementById('btn-free').style.borderColor='#185FA5';
    document.getElementById('btn-list').style.background='#fff';
    document.getElementById('btn-list').style.color='#333';
    document.getElementById('btn-list').style.borderColor='#ddd';
    document.getElementById('duplicate-msg').innerHTML='';
  }
}
 
function checkDuplicate(name){
  const msg=document.getElementById('duplicate-msg');
  if(!name){msg.innerHTML='';return;}
  const ownDeal=deals.find(d=>d.target_name===name&&d.agency_name===currentProfile.agency_name);
  const otherDeal=deals.find(d=>d.target_name===name&&d.agency_name!==currentProfile.agency_name);
  if(ownDeal){
    msg.innerHTML=`<div style="background:#F8D7DA;border:1px solid #f5c6cb;border-radius:8px;padding:8px 12px;font-size:12px;color:#721C24">⛔ 自社ですでに登録済みの企業です。重複登録はできません。</div>`;
    document.getElementById('btn-save-new').disabled=true;
    document.getElementById('btn-save-new').style.opacity='0.5';
  } else if(otherDeal){
    msg.innerHTML=`<div style="background:#FFF3CD;border:1px solid #FFECB5;border-radius:8px;padding:8px 12px;font-size:12px;color:#856404">⚠️ 他の代理店がすでに案件登録しています。このまま登録しますか？</div>`;
    document.getElementById('btn-save-new').disabled=false;
    document.getElementById('btn-save-new').style.opacity='1';
  } else {
    msg.innerHTML=`<div style="background:#D4EDDA;border:1px solid #c3e6cb;border-radius:8px;padding:8px 12px;font-size:12px;color:#155724">✅ 登録可能です。</div>`;
    document.getElementById('btn-save-new').disabled=false;
    document.getElementById('btn-save-new').style.opacity='1';
  }
}
 
async function saveDeal(targetName){
  const d=deals.find(x=>x.target_name===targetName);
  const payload={
    target_name:targetName,
    agency_name:currentProfile.agency_name,
    status:document.getElementById('f_status').value,
    person:document.getElementById('f_person').value,
    amount:parseInt(document.getElementById('f_amount').value)||0,
    first_contact:document.getElementById('f_firstContact').value||null,
    next_action:document.getElementById('f_nextAction').value,
    memo:document.getElementById('f_memo').value,
    updated_at:new Date().toISOString(),
  };
  if(d){
    await sb.from('deals').update(payload).eq('id',d.id);
  } else {
    payload.created_at=new Date().toISOString();
    await sb.from('deals').insert(payload);
  }
  await loadDeals();
  closeModal();
  renderView();
}
 
async function saveNewDeal(){
  const listEl=document.getElementById('f_target_list');
  const freeEl=document.getElementById('f_target_free');
  const isListMode=document.getElementById('input-list').style.display!=='none';
  const targetName=isListMode?(listEl?listEl.value:''):(freeEl?freeEl.value.trim():'');
 
  if(!targetName){
    alert('企業名を入力または選択してください。');
    return;
  }
  const ownDeal=deals.find(d=>d.target_name===targetName&&d.agency_name===currentProfile.agency_name);
  if(ownDeal){
    alert('自社ですでに登録済みの企業です。');
    return;
  }
  const payload={
    target_name:targetName,
    agency_name:currentProfile.agency_name,
    status:document.getElementById('f_status').value,
    person:document.getElementById('f_person').value,
    amount:parseInt(document.getElementById('f_amount').value)||0,
    first_contact:document.getElementById('f_firstContact').value||null,
    next_action:document.getElementById('f_nextAction').value,
    memo:document.getElementById('f_memo').value,
    created_at:new Date().toISOString(),
    updated_at:new Date().toISOString(),
  };
  await sb.from('deals').insert(payload);
  await loadDeals();
  closeModal();
  renderView();
}
 
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
