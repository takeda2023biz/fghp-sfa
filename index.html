<script>
// ── キャッシュ強制クリア（ログインフリーズ防止）──
(function(){
  // Service Worker 登録解除
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(reg=>reg.unregister());
    });
  }
  // Cache Storage 削除
  if('caches' in window){
    caches.keys().then(keys=>{
      keys.forEach(key=>caches.delete(key));
    });
  }
  // 古い sb- セッションキーをクリア
  try{
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith('sb-'))localStorage.removeItem(k);
    });
  }catch(e){}
})();
</script>

/* ── ターゲット取得：approved + 自分のpending ── */
async function loadTargets(){
  const{data,error}=await sb.from('targets').select('*').order('rank');
  if(error){ console.error('targets テーブル取得エラー:', error.message); return []; }
  const filtered=(data||[]).filter(t=>{
    if(t.approval_status==='approved') return true;
    if(t.approval_status==='pending'){
      if(!currentProfile) return false;
      if(['maker','tokuyakuten'].includes(currentProfile.role)) return true;
      return t.submitted_by===currentProfile.agency_name;
    }
    return false;
  });
  return applyLocalStorageOverrides(filtered);
}

let _loginBusy=false;
let _loginFailCount=0;
const _LOGIN_DELAYS=[0,0,3000,5000,10000];

async function doLogin(){
  if(_loginBusy)return;
  _loginBusy=true;
  const btn=document.querySelector('#loginView .btn-primary');
  if(btn){btn.textContent='ログイン中...';btn.disabled=true;}
  document.getElementById('loginError').textContent='';
  const delay=_LOGIN_DELAYS[Math.min(_loginFailCount,_LOGIN_DELAYS.length-1)];
  if(delay>0){
    document.getElementById('loginError').textContent=`${delay/1000}秒後に再試行できます...`;
    await new Promise(r=>setTimeout(r,delay));
    document.getElementById('loginError').textContent='';
  }
  try{
    const email=document.getElementById('loginEmail').value.trim();
    const pass=document.getElementById('loginPassword').value;
    if(!email||!pass){document.getElementById('loginError').textContent='メールアドレスとパスワードを入力してください。';_loginBusy=false;if(btn){btn.textContent='ログイン';btn.disabled=false;}return;}
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      _loginFailCount++;
      document.getElementById('loginError').textContent='ログインに失敗しました: '+error.message;
      return;
    }
    _loginFailCount=0;
    await loadProfile(data.user);
  }catch(e){
    _loginFailCount++;
    document.getElementById('loginError').textContent='エラーが発生しました。再度お試しください。';
  }finally{
    _loginBusy=false;
    if(btn){btn.textContent='ログイン';btn.disabled=false;}
  }
}

async function loadProfile(user){
  currentUser=user;
  const{data,error}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(error||!data){
    console.error('プロファイル取得失敗:', error?.message);
    await new Promise(r=>setTimeout(r,1000));
    const{data:data2,error:error2}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(error2||!data2){
      console.error('プロファイル取得リトライ失敗:', error2?.message);
      document.getElementById('loginError').textContent='プロファイルの読み込みに失敗しました。再度ログインしてください。';
      await sb.auth.signOut();
      return;
    }
    currentProfile=data2;
  } else {
    currentProfile=data;
  }
  const profile=currentProfile;
  TARGETS = await loadTargets();
  await loadDeals();
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='flex';
  const roleClass={'maker':'role-maker','tokuyakuten':'role-tokuyakuten','agency':'role-agency'}[profile.role]||'role-agency';
  const roleLabel={'maker':'メーカー','tokuyakuten':'特約店','agency':'代理店'}[profile.role]||'代理店';
  document.getElementById('userInfoLabel').innerHTML=`${profile.name}<span class="user-role ${roleClass}">${roleLabel}</span>`;
  const pricesNav=document.getElementById('nav-prices');
  if(pricesNav) pricesNav.style.display=(profile.role==='agency')?'none':'block';
  currentView='list';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  var navEl=document.getElementById('nav-list');if(navEl)navEl.classList.add('active');
  renderView();
}

async function loadDeals(){
  const{data}=await sb.from('deals').select('*');
  deals=data||[];
  if(deals.length>0){
    const ids=deals.map(d=>d.id);
    const[{data:items},{data:logs},{data:atts}]=await Promise.all([
      sb.from('deal_items').select('*').in('deal_id',ids),
      sb.from('deal_logs').select('*').in('deal_id',ids).order('log_date',{ascending:false}),
      sb.from('deal_attachments').select('*').in('deal_id',ids),
    ]);
    dealItems={};
    (items||[]).forEach(item=>{if(!dealItems[item.deal_id])dealItems[item.deal_id]=[];dealItems[item.deal_id].push(item);});
    dealLogs={};
    (logs||[]).forEach(log=>{if(!dealLogs[log.deal_id])dealLogs[log.deal_id]=[];dealLogs[log.deal_id].push(log);});
    dealAttachments={};
    (atts||[]).forEach(a=>{if(!dealAttachments[a.deal_id])dealAttachments[a.deal_id]=[];dealAttachments[a.deal_id].push(a);});
  } else {dealItems={};dealLogs={};dealAttachments={};}
  const{data:prices}=await sb.from('agency_prices').select('*');
  agencyPrices=prices||[];
}

async function doLogout(){
  await sb.auth.signOut();currentUser=null;currentProfile=null;deals=[];dealItems={};dealLogs={};dealAttachments={};agencyPrices=[];
  TARGETS=[];
  document.getElementById('loginView').style.display='flex';
  document.getElementById('appView').style.display='none';
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&session&&!currentUser){await loadProfile(session.user);}
  if(event==='SIGNED_OUT'){
    currentUser=null;currentProfile=null;deals=[];dealItems={};dealLogs={};dealAttachments={};agencyPrices=[];
    TARGETS=[];
    document.getElementById('loginView').style.display='flex';

  }
});

/* ── 製品明細ヘルパー ── */
function calcItemTotal(item){
  const p=PRODUCTS.find(x=>x.id===item.productId);if(!p)return 0;
  let base=p.listPrice*(item.qty||1);
  editingOptions.forEach(optId=>{const o=OPTIONS.find(x=>x.id===optId);if(o)base+=o.listPrice*(item.qty||1);});
  return base;
}
function renderItemsTotal(){
  const total=editingItems.reduce((s,item)=>s+calcItemTotal(item),0);
  const el=document.getElementById('items-total');
  if(el)el.textContent=total>0?'合計（定価）: '+total.toLocaleString()+'円':'';
}
function renderProductRows(){
  const wrap=document.getElementById('product-rows');if(!wrap)return;
  if(editingItems.length===0){
    wrap.innerHTML='<div style="padding:12px;color:#bbb;font-size:12px;text-align:center">製品が追加されていません</div>';
    renderItemsTotal();return;
  }
  wrap.innerHTML=editingItems.map((item,idx)=>{
    return `<div class="product-item-row">
      <div>
        <select class="product-select" onchange="updateItemProduct(${idx},this.value)">
          <option value="">-- 型式を選択 --</option>
          ${PRODUCTS.map(p=>`<option value="${p.id}"${item.productId===p.id?' selected':''}>${p.id} ${p.name}（照射${p.angle}・定価${p.listPrice.toLocaleString()}円）</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;flex-direction:column;justify-content:center;"><div style="font-size:10px;color:#888;margin-bottom:2px">数量</div><input type="number" class="product-qty"
      <button class="product-remove-btn" onclick="removeItem(${idx})">✕</button>
    </div>`;
  }).join('');
  renderItemsTotal();
}
function renderOptionsArea(){
  const wrap=document.getElementById('global-options');if(!wrap)return;
  wrap.innerHTML=OPTIONS.map(o=>`<label class="product-option-check"><input type="checkbox" ${editingOptions.includes(o.id)?'checked':''} onchange="toggleGlobalOption('${o.id}',this.checked)"> ${o.name}（${o.listPrice.toLocaleString()}円／台）</label>`).join('');
}
function toggleGlobalOption(optId,checked){
  if(checked){if(!editingOptions.includes(optId))editingOptions.push(optId);}
  else{editingOptions=editingOptions.filter(x=>x!==optId);}
  renderItemsTotal();
}
function addProductItem(){editingItems.push({productId:'',qty:1});renderProductRows();}
function removeItem(idx){editingItems.splice(idx,1);renderProductRows();}
function updateItemProduct(idx,val){editingItems[idx].productId=val;renderItemsTotal();}
function updateItemQty(idx,val){editingItems[idx].qty=Math.max(1,parseInt(val)||1);renderItemsTotal();}
function toggleOption(idx,optId,checked){} // 旧関数（互換性保持）

function renderDealItemsHtml(dealId){
  const items=dealItems[dealId]||[];
  if(items.length===0)return '<div style="color:#bbb;font-size:12px">製品未登録</div>';
  let total=0;
  const rows=items.map(item=>{
    const p=PRODUCTS.find(x=>x.id===item.product_model);
    const opts=item.options?JSON.parse(item.options||'[]'):[];
    let unitPrice=p?p.listPrice:0;
    const optNames=[];
    opts.forEach(optId=>{const o=OPTIONS.find(x=>x.id===optId);if(o){unitPrice+=o.listPrice;optNames.push(o.name);}});
    const lineTotal=unitPrice*(item.qty||1);total+=lineTotal;
    return `<tr><td>${item.product_model||'-'}</td><td>${item.product_name||'-'}</td><td style="text-align:center">${item.qty||1}</td><td>${optNames.length?optNames.join('・'):'-'}</td><td style="text-align:right">${unitPrice.toLocaleString()}円</td><td style="text-align:right;font-weight:500">${lineTotal.toLocaleString()}円</td></tr>`;
  }).join('');
  return `<table class="deal-items-table"><thead><tr><th>型式</th><th>製品名</th><th>数量</th><th>オプション</th><th>単価(定価)</th><th>小計(定価)</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="5" style="text-align:right;font-weight:600;padding:6px 8px;border-top:1px solid #e8e8e8">合計（定価）</td><td style="text-align:right;font-weight:700;color:#185FA5;padding:6px 8px;border-top:1px solid #e8e8e8">${total.toLocaleString()}円</td></tr></tfoot></table>`;
}

/* ── 年度算出（4月始まり） ── */
function getFiscalYear(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const m = d.getMonth()+1; // 1-12
  return m >= 4 ? y : y - 1;
}
/* 案件の実質年度：first_contact 優先、なければ created_at */
function getDealFiscalYear(deal){
  return getFiscalYear(deal.first_contact || deal.created_at);
}

/* ── 提案期限チェック（提案日から90日） ── */
function isProposalExpired(deal){
  if(deal.status!=='提案中'||!deal.proposal_date) return false;
  const pd=new Date(deal.proposal_date);
  const diff=(new Date()-pd)/(1000*60*60*24);
  return diff>=90;
}

      if(!d) return false; // 未着手は年度指定時は非表示

    }
    return true;

function renderKanban(c){

  const fyOptions = fyList.map(y=>`<option value="${y}"${kanbanFiscalYear===y?' selected':''}>${y}年度</option>`).join('');
  const filteredDeals = deals.filter(d=>{
    if(currentProfile.role==='agency' && d.agency_name!==currentProfile.agency_name) return false;
    if(kanbanFiscalYear!==null && getDealFiscalYear(d)!==kanbanFiscalYear) return false;
    return true;

  let html=`<div class="section-head">
    <span class="section-title">商談ボード</span>

      </select>
      <span style="font-size:12px;color:#aaa">${filteredDeals.length}件</span>
    </div>
  </div>
  <div class="kanban-wrap">`;
  STATUSES.forEach(st=>{
    const items=filteredDeals.filter(d=>d.status===st);
    html+=`<div class="kanban-col"><div class="kanban-col-title"><span class="badge badge-${st}">${st}</span><span style="color:#aaa;font-size:11px">${items.length}</span></div>`;
    items.forEach(d=>{const expired=isProposalExpired(d);html+=`<div class="kanban-card" onclick="openDeal('${d.target_name.replace(/'/g,"\\'")}',true)"><div class="kanban-card-name">${d.target_name}${expired?'<span class="badge badge-期限切れ" style="margin-left:4px;font-size:10px">⚠️ 期限切れ</span>':''}</div><div class="kanban-card-cat"><span class="badge badge-agency">${d.agency_name}</span></div>${d.amount?`<div class="kanban-card-amt">${Math.round(d.amount/10000)}万円</div>`:''}</div>`;});

      <td style="font-size:11px">${t.prefecture?`<span style="background:#f0f4ff;color:#2b4acb;padding:1px 6px;border-radius:4px">${t.prefecture}</span>`:'<span style="color:#bbb">-</span>'}</td>
      <td style="font-size:11px">${t.area?`<span style="background:#f0faf4;color:#1a7a4a;padding:1px 6px;border-radius:4px">${t.area}</span>`:'<span style="color:#bbb">-</span>'}</td>
      <td style="font-size:11px">${t.url?`<a href="${t.url}" target="_blank" style="color:#185FA5">サイトへ</a>`:''}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm" onclick="openTargetEdit('${t.name.replace(/'/g,"\\'")}',${t.id})" style="margin-right:4px">編集</button>

      </td>
    </tr>`;
  });
  html+=`</tbody></table>
  <div class="pager"><span>${approvedTargets.length}件中 ${targetPage*TARGET_PAGE_SIZE+1}〜${Math.min((targetPage+1)*TARGET_PAGE_SIZE,approvedTargets.length)}件</span><button ${targetPage===0?'disabled':''} onclick="targetPage--;renderView()">◀ 前へ</button><span>${targetPage+1} / ${tTotalPages||1}</span><button ${targetPage>=tTotalPages-1?'disabled':''} onclick="targetPage++;renderView()">次へ ▶</button></div>
  </div>`;
  if(showPending.length>0){
    html+=`<div id="target-tab-pending" class="tab-panel">
    <table class="card-table"><thead><tr><th>企業名</th><th>カテゴリ</th><th>業種</th><th>申請者</th><th>申請日</th>${canApprove?'<th>操作</th>':''}</tr></thead><tbody>`;

        <td><b>${t.name}</b>${t.url?`<br><a href="${t.url}" target="_blank" style="font-size:10px;color:#185FA5">${t.url.substring(0,30)}</a>`:''}</td>

  }
  c.innerHTML=html;

function switchTargetTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const panel=document.getElementById('target-tab-'+tab);
  if(panel)panel.classList.add('active');
}

async function deleteTarget(id,name){
  if(!confirm(`「${name}」を削除しますか？\n関連する案件データは残ります。`))return;
  const{error}=await sb.from('targets').delete().eq('id',id);
  if(error){alert('削除に失敗しました: '+error.message);return;}
  TARGETS=await loadTargets();
  renderView();
}

async function approveTarget(id){
  const{error}=await sb.from('targets').update({approval_status:'approved'}).eq('id',id);
  if(error){alert('承認に失敗しました: '+error.message);return;}
  TARGETS=await loadTargets();
  renderView();
}

async function rejectTarget(id,name){
  if(!confirm(`「${name}」の申請を却下しますか？\n（ターゲットデータは削除されます）`))return;
  const{error}=await sb.from('targets').delete().eq('id',id);
  if(error){alert('却下に失敗しました: '+error.message);return;}
  TARGETS=await loadTargets();
  renderView();
}

function onNewTargetAddress(val){

  const ae=document.getElementById('nt_area');
  if(pe&&pref&&!pe.value)pe.value=pref;

}
function onNewTargetPref(val){
  const ae=document.getElementById('nt_area');

async function saveNewTarget(isPending){
  const name=document.getElementById('nt_name').value.trim();
  const category=document.getElementById('nt_category').value;
  const industry=document.getElementById('nt_industry').value.trim();
  if(!name){alert('企業名・施設名を入力してください。');return;}
  if(!category){alert('カテゴリを選択してください。');return;}
  if(!industry){alert('業種を入力してください。');return;}
  if(TARGETS.find(t=>t.name===name)){alert('同じ名前のターゲットがすでに存在します。');return;}
  const{data:sd}=await sb.auth.getSession();
  if(!sd.session){const{error:re}=await sb.auth.refreshSession();if(re){alert('セッションが切れています。再ログインしてください。');return;}}
  const payload={
    name,category,industry,
    priority:document.getElementById('nt_priority').value||'B',
    url:document.getElementById('nt_url').value.trim()||null,
    address:document.getElementById('nt_address').value.trim()||null,
    prefecture:document.getElementById('nt_prefecture').value||null,
    area:document.getElementById('nt_area').value||null,
    approval_status:isPending?'pending':'approved',
    submitted_by:isPending?currentProfile.agency_name:null,
    submitted_at:isPending?new Date().toISOString():null,
    rank:9000,
  };
  const{error}=await sb.from('targets').insert(payload);
  if(error){alert('登録に失敗しました: '+error.message);return;}
  TARGETS=await loadTargets();
  closeModal();
  alert(isPending?`「${name}」を仮登録しました。特約店またはメーカーの承認をお待ちください。`:`「${name}」を登録しました。`);
  renderView();
}

async function saveDeal(targetName){
  const d=deals.find(x=>x.target_name===targetName);
  const payload={target_name:targetName,agency_name:currentProfile.agency_name,status:document.getElementById('f_status').value,deal_type:document.getElementById('f_deal_type')?document.getElementById('f_deal_type').value||null:null,person:document.getElementById('f_person').value,amount:parseInt(document.getElementById('f_amount').value)||0,first_contact:document.getElementById('f_firstContact').value||null,proposal_date:document.getElementById('f_proposalDate')?document.getElementById('f_proposalDate').value||null:null,next_action:document.getElementById('f_nextAction').value,memo:document.getElementById('f_memo').value,updated_at:new Date().toISOString()};
  let dealId;
  if(d){await sb.from('deals').update(payload).eq('id',d.id);dealId=d.id;}
  else{payload.created_at=new Date().toISOString();const{data:newDeal}=await sb.from('deals').insert(payload).select().single();dealId=newDeal.id;}
  await sb.from('deal_items').delete().eq('deal_id',dealId);
  const validItems=editingItems.filter(item=>item.productId);
  if(validItems.length>0){
    const itemPayloads=validItems.map(item=>{const prod=PRODUCTS.find(x=>x.id===item.productId);return{deal_id:dealId,product_model:item.productId,product_name:prod?prod.name:'',qty:item.qty||1,options:JSON.stringify(editingOptions),list_price:prod?prod.listPrice:0,created_at:new Date().toISOString()};});
    await sb.from('deal_items').insert(itemPayloads);
  }
  const logDate=document.getElementById('f_log_date')?document.getElementById('f_log_date').value:'';
  const logMemo=document.getElementById('f_log_memo')?document.getElementById('f_log_memo').value.trim():'';
  if(logDate&&logMemo){
    await sb.from('deal_logs').insert({deal_id:dealId,log_date:logDate,memo:logMemo,created_by:currentUser.id,created_at:new Date().toISOString()});
    document.getElementById('f_log_memo').value='';
  }
  await loadDeals();closeModal();renderView();
}

function switchInputMode(mode){
  const isList=mode==='list';
  document.getElementById('input-list').style.display=isList?'block':'none';
  document.getElementById('input-free').style.display=isList?'none':'block';
  document.getElementById('btn-list').style.cssText=isList?'flex:1;background:#185FA5;color:#fff;border-color:#185FA5':'flex:1';
  document.getElementById('btn-free').style.cssText=isList?'flex:1':'flex:1;background:#185FA5;color:#fff;border-color:#185FA5';
  document.getElementById('duplicate-msg').innerHTML='';
}

function checkDuplicate(name){
  const msg=document.getElementById('duplicate-msg');
  if(!name){msg.innerHTML='';return;}
  const ownDeal=deals.find(d=>d.target_name===name&&d.agency_name===currentProfile.agency_name);
  const otherDeal=deals.find(d=>d.target_name===name&&d.agency_name!==currentProfile.agency_name);
  const btn=document.getElementById('btn-save-new');
  if(ownDeal){msg.innerHTML=`<div style="background:#F8D7DA;border:1px solid #f5c6cb;border-radius:8px;padding:8px 12px;font-size:12px;color:#721C24">⛔ 自社ですでに登録済みの企業です。</div>`;if(btn){btn.disabled=true;btn.style.opacity='0.5';}}
  else if(otherDeal){msg.innerHTML=`<div style="background:#FFF3CD;border:1px solid #FFECB5;border-radius:8px;padding:8px 12px;font-size:12px;color:#856404">⚠️ 他の代理店がすでに案件登録しています。このまま登録しますか？</div>`;if(btn){btn.disabled=false;btn.style.opacity='1';}}
  else{msg.innerHTML=`<div style="background:#D4EDDA;border:1px solid #c3e6cb;border-radius:8px;padding:8px 12px;font-size:12px;color:#155724">✅ 登録可能です。</div>`;if(btn){btn.disabled=false;btn.style.opacity='1';}}
}

async function saveNewDeal(){
  const isListMode=document.getElementById('input-list').style.display!=='none';
  const targetName=isListMode?(document.getElementById('f_target_list')||{value:''}).value:((document.getElementById('f_target_free')||{value:''}).value.trim());
  if(!targetName){alert('企業名を入力または選択してください。');return;}
  const ownDeal=deals.find(d=>d.target_name===targetName&&d.agency_name===currentProfile.agency_name);
  if(ownDeal){alert('自社ですでに登録済みの企業です。');return;}
  const payload={target_name:targetName,agency_name:currentProfile.agency_name,status:document.getElementById('f_status').value,deal_type:document.getElementById('f_deal_type')?document.getElementById('f_deal_type').value||null:null,person:document.getElementById('f_person').value,amount:parseInt(document.getElementById('f_amount').value)||0,first_contact:document.getElementById('f_firstContact').value||null,proposal_date:document.getElementById('f_proposalDate')?document.getElementById('f_proposalDate').value||null:null,next_action:document.getElementById('f_nextAction').value,memo:document.getElementById('f_memo').value,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  const{data:newDeal}=await sb.from('deals').insert(payload).select().single();
  const dealId=newDeal.id;
  const validItems=editingItems.filter(item=>item.productId);
  if(validItems.length>0){
    const itemPayloads=validItems.map(item=>{const prod=PRODUCTS.find(x=>x.id===item.productId);return{deal_id:dealId,product_model:item.productId,product_name:prod?prod.name:'',qty:item.qty||1,options:JSON.stringify(editingOptions),list_price:prod?prod.listPrice:0,created_at:new Date().toISOString()};});
    await sb.from('deal_items').insert(itemPayloads);
  }
  await loadDeals();closeModal();renderView();
}

async function resetExpiredDeal(dealId){
  if(!confirm('この案件のステータスを「未着手」にリセットしますか？\n（提案期限切れとして処理されます）'))return;
  const{error}=await sb.from('deals').update({status:'未着手',proposal_date:null,updated_at:new Date().toISOString()}).eq('id',dealId);
  if(error){alert('リセットに失敗しました: '+error.message);return;}

  renderView();

function renderLogsHtml(dealId){
  const logs=dealId?dealLogs[dealId]||[]:[];
  if(logs.length===0)return'<div style="padding:12px;color:#bbb;font-size:12px;text-align:center">ログがありません</div>';
  return logs.map(l=>`<div class="log-item"><div class="log-date">${l.log_date}</div><div class="log-memo">${l.memo||''}</div></div>`).join('');
}

async function addLog(dealId){
  const logDate=document.getElementById('f_log_date').value;
  const memo=document.getElementById('f_log_memo').value.trim();
  if(!logDate||!memo){alert('日付とメモを入力してください。');return;}
  if(!dealId){alert('先に商談情報を保存してから、ログを追記してください。');return;}
  const{error}=await sb.from('deal_logs').insert({deal_id:dealId,log_date:logDate,memo:memo,created_by:currentUser.id,created_at:new Date().toISOString()});
  if(error){alert('追記に失敗しました: '+error.message);return;}
  document.getElementById('f_log_memo').value='';
  if(!dealLogs[dealId])dealLogs[dealId]=[];
  dealLogs[dealId].unshift({log_date:logDate,memo:memo});
  const el=document.getElementById('log-list-edit');
  if(el)el.innerHTML=renderLogsHtml(dealId);
}

function renderAttachmentsHtml(dealId,canDelete){
  const atts=dealId?dealAttachments[dealId]||[]:[];
  if(atts.length===0)return'<div style="padding:12px;color:#bbb;font-size:12px;text-align:center">添付ファイルがありません</div>';
  return atts.map(a=>`<div class="attach-item">
    <span class="attach-type-badge attach-type-${a.file_type}">${a.file_type}</span>
    <span class="attach-name" onclick="downloadAttachment('${a.storage_path}','${a.file_name}')">${a.file_name}</span>
    ${canDelete?`<button class="attach-delete" onclick="deleteAttachment(${a.id},'${a.storage_path}',${dealId})">削除</button>`:''}
  </div>`).join('');
}

async function downloadAttachment(storagePath,fileName){
  const{data,error}=await sb.storage.from('deal-files').createSignedUrl(storagePath,300);
  if(error){alert('ダウンロードURLの取得に失敗しました。');return;}
  const a=document.createElement('a');
  a.href=data.signedUrl;a.download=fileName;a.target='_blank';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

async function uploadAttachment(dealId){
  if(!dealId){alert('先に商談情報を保存してから、ファイルをアップロードしてください。');return;}
  const fileInput=document.getElementById('f_attach_file');
  const fileType=document.getElementById('f_attach_type').value;
  const file=fileInput.files[0];
  if(!file){alert('ファイルを選択してください。');return;}
  if(file.size>50*1024*1024){alert('ファイルサイズは50MB以下にしてください。');return;}
  const progressWrap=document.getElementById('upload-progress');
  const progressBar=document.getElementById('upload-progress-bar');
  if(progressWrap)progressWrap.style.display='block';
  if(progressBar)progressBar.style.width='0%';
  const safeName=file.name.replace(/[^a-zA-Z0-9_\u3000-\u9FFF\uFF00-\uFFEF.\-]/g,'_');
  const storagePath=`${currentProfile.agency_name}/${dealId}/${Date.now()}_${safeName}`;
  if(progressBar)progressBar.style.width='30%';
  const{error:upError}=await sb.storage.from('deal-files').upload(storagePath,file,{upsert:false});
  if(upError){if(progressWrap)progressWrap.style.display='none';alert('アップロードに失敗しました: '+upError.message);return;}
  if(progressBar)progressBar.style.width='70%';
  const{error:dbError}=await sb.from('deal_attachments').insert({deal_id:dealId,file_type:fileType,file_name:file.name,storage_path:storagePath,uploaded_by:currentUser.id,created_at:new Date().toISOString()});
  if(dbError){if(progressWrap)progressWrap.style.display='none';alert('ファイル情報の保存に失敗しました: '+dbError.message);return;}
  if(progressBar)progressBar.style.width='100%';
  setTimeout(()=>{if(progressWrap)progressWrap.style.display='none';},500);
  fileInput.value='';
  if(!dealAttachments[dealId])dealAttachments[dealId]=[];
  dealAttachments[dealId].push({file_type:fileType,file_name:file.name,storage_path:storagePath,id:Date.now()});
  const el=document.getElementById('attach-list-edit');
  if(el)el.innerHTML=renderAttachmentsHtml(dealId,true);
}

async function deleteAttachment(attachId,storagePath,dealId){
  if(!confirm('このファイルを削除しますか？'))return;
  await sb.storage.from('deal-files').remove([storagePath]);
  await sb.from('deal_attachments').delete().eq('id',attachId);
  if(dealAttachments[dealId])dealAttachments[dealId]=dealAttachments[dealId].filter(a=>a.id!==attachId);
  const el=document.getElementById('attach-list-edit');
  if(el)el.innerHTML=renderAttachmentsHtml(dealId,true);
}

function renderPrices(c){
  const role=currentProfile.role;
  const myAgency=currentProfile.agency_name;
  const agencies=[...new Set(deals.map(d=>d.agency_name))].sort();
  if(agencies.length===0&&role==='agency')agencies.push(myAgency);
  const visibleAgencies = role==='agency' ? [myAgency] : agencies;
  let html=`<div class="section-head"><span class="section-title">仕切価格管理</span></div><div class="info-banner">`;
  if(role==='maker'||role==='tokuyakuten'){html+=`代理店ごとの仕切価格を設定できます。代理店は自社の仕切価格のみ参照できます。`;}
  else{html+=`自社（${myAgency}）の仕切価格を参照できます。`;}
  html+=`</div>`;
  if(visibleAgencies.length===0){html+=`<div style="color:#aaa;font-size:13px;padding:20px">代理店情報がありません。案件登録後に表示されます。</div>`;c.innerHTML=html;return;}
  if(visibleAgencies.length>1){html+=`<div class="tab-bar">${visibleAgencies.map((ag,i)=>`<button class="tab-btn${i===0?' active':''}" onclick="switchPriceTab('${ag.replace(/'/g,"\\'")}',this)">${ag}</button>`).join('')}</div>`;}
  html+=visibleAgencies.map((ag,i)=>`<div class="tab-panel${i===0?' active':''}" id="price-tab-${ag.replace(/[^a-zA-Z0-9]/g,'_')}">${renderPriceTable(ag, role)}</div>`).join('');
  if(role==='tokuyakuten'||role==='maker'){html+=`<div style="margin-top:16px;text-align:right"><button class="btn btn-primary btn-sm" onclick="saveAllPrices()">全代理店の仕切価格を保存</button></div>`;}
  c.innerHTML=html;
}

function switchPriceTab(agencyName, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const tabId='price-tab-'+agencyName.replace(/[^a-zA-Z0-9]/g,'_');
  const tab=document.getElementById(tabId);
  if(tab)tab.classList.add('active');
}

function renderPriceTable(agencyName, role){
  const canEdit=(role==='tokuyakuten'||role==='maker');
  const getPrice=(productId)=>{const p=agencyPrices.find(x=>x.agency_name===agencyName&&x.product_id===productId);return p?p.shikiri_price:'';};
  const getRate=(productId,listPrice)=>{const p=agencyPrices.find(x=>x.agency_name===agencyName&&x.product_id===productId);if(!p||!p.shikiri_price||!listPrice)return'';return'（掛率 '+(p.shikiri_price/listPrice*100).toFixed(1)+'%）';};
  const agKey=agencyName.replace(/[^a-zA-Z0-9]/g,'_');
  let html=`<table class="shikiri-table" style="margin-bottom:16px"><thead><tr><th>種別</th><th>型式 / オプション名</th><th>定価</th><th>仕切価格${canEdit?'（編集可）':''}</th><th>掛率</th></tr></thead><tbody>`;
  PRODUCTS.forEach(p=>{
    const priceVal=getPrice(p.id);const rateStr=getRate(p.id,p.listPrice);
    html+=`<tr><td style="font-size:11px;color:#888">本体</td><td><b style="font-size:12px">${p.id}</b><br><span style="font-size:11px;color:#888">${p.name}（照射${p.angle}・${p.ip}）</span></td><td style="font-weight:500">${p.listPrice.toLocaleString()}円</td><td>${canEdit?`<input type="number" class="shikiri-input" id="sp_${agKey}_${p.id}" value="${priceVal}" placeholder="未設定" oninput="updateRateDisplay('${agKey}','${p.id}',${p.listPrice},this.value)">`:`<span style="font-weight:600;color:#185FA5">${priceVal?priceVal.toLocaleString()+'円':'（未設定）'}</span>`}</td><td id="rate_${agKey}_${p.id}" class="shikiri-rate">${rateStr}</td></tr>`;
  });
  OPTIONS.forEach(o=>{
    const priceVal=getPrice(o.id);const rateStr=getRate(o.id,o.listPrice);
    html+=`<tr><td style="font-size:11px;color:#888">オプション</td><td><b style="font-size:12px">${o.name}</b></td><td style="font-weight:500">${o.listPrice.toLocaleString()}円</td><td>${canEdit?`<input type="number" class="shikiri-input" id="sp_${agKey}_${o.id}" value="${priceVal}" placeholder="未設定" oninput="updateRateDisplay('${agKey}','${o.id}',${o.listPrice},this.value)">`:`<span style="font-weight:600;color:#185FA5">${priceVal?priceVal.toLocaleString()+'円':'（未設定）'}</span>`}</td><td id="rate_${agKey}_${o.id}" class="shikiri-rate">${rateStr}</td></tr>`;
  });
  html+=`</tbody></table>`;
  if(canEdit){html+=`<div style="text-align:right"><button class="btn btn-primary btn-sm" onclick="savePricesForAgency('${agencyName.replace(/'/g,"\\'")}')">この代理店の仕切価格を保存</button></div>`;}
  return html;
}

function updateRateDisplay(agKey,productId,listPrice,val){
  const el=document.getElementById('rate_'+agKey+'_'+productId);if(!el)return;
  const v=parseInt(val);if(!v||!listPrice){el.textContent='';return;}
  el.textContent='（掛率 '+(v/listPrice*100).toFixed(1)+'%）';
}

async function savePricesForAgency(agencyName){
  const agKey=agencyName.replace(/[^a-zA-Z0-9]/g,'_');
  const allProducts=[...PRODUCTS.map(p=>({id:p.id,type:'body'})),...OPTIONS.map(o=>({id:o.id,type:'option'}))];
  const upserts=[];
  allProducts.forEach(({id,type})=>{
    const el=document.getElementById('sp_'+agKey+'_'+id);if(!el)return;
    const val=parseInt(el.value)||null;
    upserts.push({agency_name:agencyName,product_id:id,product_type:type,shikiri_price:val,updated_at:new Date().toISOString(),updated_by:currentUser.id});
  });
  const{error}=await sb.from('agency_prices').upsert(upserts,{onConflict:'agency_name,product_id'});
  if(error){alert('保存に失敗しました: '+error.message);return;}
  upserts.forEach(u=>{const idx=agencyPrices.findIndex(x=>x.agency_name===u.agency_name&&x.product_id===u.product_id);if(idx>=0)agencyPrices[idx]={...agencyPrices[idx],...u};else agencyPrices.push(u);});
  alert(`${agencyName} の仕切価格を保存しました。`);
}

async function saveAllPrices(){
  const agencies=[...new Set(deals.map(d=>d.agency_name))].sort();
  for(const ag of agencies)await savePricesForAgency(ag);
}

let _searchTimer=null;
let _imeComposing=false;
function initSearchInput(){
  const el=document.getElementById('searchInput');
  if(!el||el._sfaInited)return;
  el._sfaInited=true;
  el.addEventListener('compositionstart',()=>{_imeComposing=true;});
  el.addEventListener('compositionend',()=>{_imeComposing=false;searchQ=el.value;page=0;renderView();restoreSearch();});
  el.addEventListener('input',()=>{if(_imeComposing)return;searchQ=el.value;page=0;renderView();restoreSearch();});
}
function restoreSearch(){
  const el=document.getElementById('searchInput');
  if(el){initSearchInput();el.focus();const len=el.value.length;el.setSelectionRange(len,len);}
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
